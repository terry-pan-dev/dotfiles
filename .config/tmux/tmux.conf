set -g @plugin 'tmux-plugins/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Repeatable pane resizing with Vim-style keys.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fuzzy-pick a common tmux action and run it directly.
bind-key p display-popup -E "sh -c 'choice=\$(printf \"%s\\n\" \"vertical split\" \"horizontal split\" \"resize left\" \"resize right\" \"resize up\" \"resize down\" \"new window\" \"kill pane\" \"next window\" \"previous window\" \"detach session\" | fzf --prompt=\"tmux action> \" --height=100% --reverse --border); [ -z \"\$choice\" ] && exit 0; tmux set-option -gq @last-popup-action \"\$choice\"; case \"\$choice\" in \"vertical split\") tmux split-window -h ;; \"horizontal split\") tmux split-window -v ;; \"resize left\") tmux resize-pane -L 5 ;; \"resize right\") tmux resize-pane -R 5 ;; \"resize up\") tmux resize-pane -U 5 ;; \"resize down\") tmux resize-pane -D 5 ;; \"new window\") tmux new-window ;; \"kill pane\") tmux kill-pane ;; \"next window\") tmux next-window ;; \"previous window\") tmux previous-window ;; \"detach session\") tmux detach-client ;; esac'"
bind-key . run-shell "action=\$(tmux show-option -gv @last-popup-action 2>/dev/null); [ -z \"\$action\" ] && exit 0; case \"\$action\" in \"vertical split\") tmux split-window -h ;; \"horizontal split\") tmux split-window -v ;; \"resize left\") tmux resize-pane -L 5 ;; \"resize right\") tmux resize-pane -R 5 ;; \"resize up\") tmux resize-pane -U 5 ;; \"resize down\") tmux resize-pane -D 5 ;; \"new window\") tmux new-window ;; \"kill pane\") tmux kill-pane ;; \"next window\") tmux next-window ;; \"previous window\") tmux previous-window ;; \"detach session\") tmux detach-client ;; esac"

run '~/.tmux/plugins/tpm/tpm'
